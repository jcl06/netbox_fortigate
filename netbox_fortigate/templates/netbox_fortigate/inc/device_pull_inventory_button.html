{% load i18n %}

{% if perms.dcim.change_device and object.fortigate %}
  <form method="post"
        action="{% url 'plugins:netbox_fortigate:device_pull_inventory' pk=object.fortigate.pk %}"
        class="d-inline">
    {% csrf_token %}
    <input type="hidden" value="{{ object.pk }}" name="parent"/>
    <button type="submit" class="btn btn-outline-primary">
    <i class="mdi mdi-play-speed"></i>
      {% trans "Pull Inventory" %}
    </button>
  </form>
{% endif %}
